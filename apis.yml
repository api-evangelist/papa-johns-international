description: >-
  Papa John's International, Inc. is a major US-based quick-service pizza
  restaurant chain and Fortune 1000 company operating company-owned and
  franchised locations worldwide. Papa John's runs consumer-facing online
  ordering, a Papa Rewards loyalty program, and mobile apps, and integrates
  with third-party delivery aggregators and restaurant-technology platforms.
  Papa John's does NOT publish a public developer API or developer portal; its
  technology surface is internal, franchise-facing, and partner-only.
  Integrations are arranged through enterprise and franchise partner agreements.
