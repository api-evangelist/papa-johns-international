  - type: Features
    data:
      - name: Online Ordering
        description: >-
          Consumer-facing web and mobile ordering for pizza, sides, and
          beverages across company-owned and franchised locations.
      - name: Papa Rewards Loyalty
        description: >-
          Loyalty and rewards program tracking points and offers for repeat
          consumer customers.
      - name: Third-Party Delivery
        description: >-
          Fulfillment through third-party delivery aggregators in addition to
          in-house drivers.
      - name: Partner / Franchise Integration
        description: >-
          Internal and partner-only integrations across ordering, point-of-sale,
          loyalty, and delivery systems managed under franchise and partner
          agreements. No public developer API.
  - type: Integrations
    data:
      - name: Deliverect
        description: >-
          AI-powered Smart Dispatch & Delivery Management platform unifying
          in-house and third-party order fulfillment across US restaurants
          (rollout targeted through 2027).
      - name: DoorDash
        description: >-
          Third-party delivery aggregator marketplace; Papa John's was an early
          national pizza chain to integrate with on-demand delivery aggregators.
      - name: Uber Eats
        description: Third-party delivery aggregator marketplace integration.
      - name: Grubhub
        description: Third-party delivery aggregator marketplace integration.
      - name: Kong
        description: >-
          Internal API management platform used to streamline and accelerate
          partner API integrations; not a public developer API surface.
